<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="../../favicon.svg" />
    <title>VW Bus vs. Wohnwagen: Image First</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #06070a;
        --text: #f7f4ee;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: var(--bg);
        font-family: "Avenir Next", Avenir, "Segoe UI", sans-serif;
        color: var(--text);
      }

      .deck {
        width: 100vw;
        height: 100vh;
        position: relative;
        overflow: hidden;
      }

      .slide {
        position: absolute;
        inset: 0;
        display: none;
        place-items: center;
        padding: 24px;
      }

      .slide.active {
        display: grid;
      }

      .frame {
        width: min(100%, 1920px);
        aspect-ratio: 16 / 9;
        overflow: hidden;
        border-radius: 28px;
        background: #111;
        box-shadow: 0 28px 80px rgba(0, 0, 0, 0.45);
      }

      .frame img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .hud {
        position: fixed;
        right: 18px;
        bottom: 18px;
        z-index: 20;
        padding: 10px 14px;
        border-radius: 999px;
        background: rgba(9, 11, 16, 0.82);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: rgba(247, 244, 238, 0.82);
        font-size: 0.9rem;
        letter-spacing: 0.04em;
        backdrop-filter: blur(12px);
      }

      .mobile-controls {
        display: none;
      }

      @media (max-width: 900px) {
        .slide {
          padding: 16px;
        }

        .hud {
          left: 16px;
          right: 16px;
          bottom: 88px;
          text-align: center;
          font-size: 0.82rem;
        }

        .mobile-controls {
          position: fixed;
          left: 16px;
          right: 16px;
          bottom: 18px;
          z-index: 30;
          display: grid;
          grid-template-columns: 1fr auto 1fr;
          gap: 10px;
          align-items: center;
        }

        .mobile-btn {
          appearance: none;
          border: 1px solid rgba(255, 255, 255, 0.14);
          background: rgba(9, 11, 16, 0.88);
          color: var(--text);
          min-height: 52px;
          padding: 12px 14px;
          border-radius: 999px;
          font: inherit;
          font-weight: 800;
          letter-spacing: 0.02em;
          backdrop-filter: blur(12px);
          box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
        }

        .mobile-btn:disabled {
          opacity: 0.45;
        }

        .mobile-page {
          min-width: 72px;
          text-align: center;
          padding: 10px 12px;
          border-radius: 999px;
          background: rgba(9, 11, 16, 0.82);
          border: 1px solid rgba(255, 255, 255, 0.1);
          font-size: 0.82rem;
          font-weight: 700;
        }
      }

      @media (max-aspect-ratio: 16/9) {
        .frame {
          width: 100%;
          height: auto;
        }
      }

      @media (min-aspect-ratio: 16/9) {
        .frame {
          width: auto;
          height: 100%;
        }
      }



      /* Presenter mode: keep the generated slide image sacred; chrome only appears on intent. */
      .shell {
        position: relative;
        display: block;
        width: 100vw;
        height: 100vh;
        padding: 0;
        background: #030406;
      }
      .stage {
        position: absolute;
        inset: 0;
        border: 0;
        border-radius: 0;
        background: #030406;
        box-shadow: none;
      }
      .deck {
        width: 100%;
        height: 100%;
      }
      .slide {
        inset: 0;
        padding: 0;
        min-width: 0;
        min-height: 0;
      }
      .frame {
        width: min(100vw, calc(100vh * 16 / 9), 1920px);
        max-height: 100vh;
        border-radius: 0;
        box-shadow: none;
      }
      .slide img {
        display: block;
        max-width: 100vw;
        max-height: 100vh;
        border-radius: 0;
      }
      .topbar,
      .bottombar {
        position: fixed;
        z-index: 20;
        border: 0;
        background: transparent;
        box-shadow: none;
        backdrop-filter: none;
        opacity: 0;
        pointer-events: none;
        transition: opacity 140ms ease, transform 140ms ease;
      }
      .topbar:hover,
      .topbar:focus-within,
      .bottombar:hover,
      .bottombar:focus-within,
      body.show-ui .topbar,
      body.show-ui .bottombar {
        opacity: 1;
        pointer-events: auto;
      }
      .topbar {
        top: 12px;
        left: 12px;
        right: 12px;
        width: auto;
        max-width: none;
        min-height: 0;
        padding: 0;
        border-radius: 0;
        transform: translateY(-8px);
      }
      body.show-ui .topbar,
      .topbar:hover,
      .topbar:focus-within {
        transform: translateY(0);
      }
      .bottombar {
        left: 50%;
        bottom: 12px;
        width: auto;
        max-width: calc(100vw - 24px);
        transform: translateX(-50%) translateY(8px);
        padding: 0;
        border-radius: 0;
      }
      .home-link {
        position: fixed;
        z-index: 22;
        top: 12px;
        right: 12px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        min-height: 28px;
        padding: 5px 10px;
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 999px;
        background: rgba(3, 4, 6, 0.68);
        box-shadow: 0 14px 44px rgba(0,0,0,0.34);
        color: rgba(255,255,255,0.78);
        font-size: 0.72rem;
        font-weight: 750;
        line-height: 1;
        text-decoration: none;
        backdrop-filter: blur(18px) saturate(1.08);
        -webkit-backdrop-filter: blur(18px) saturate(1.08);
        opacity: 0.34;
        transition: opacity 140ms ease, transform 140ms ease, color 140ms ease;
      }
      .home-link:hover,
      .home-link:focus-visible,
      body.show-ui .home-link {
        opacity: 1;
        color: rgba(255,255,255,0.94);
        transform: translateY(0);
      }
      body.show-ui .bottombar,
      .bottombar:hover,
      .bottombar:focus-within {
        transform: translateX(-50%) translateY(0);
      }
      .topbar::before,
      .bottombar::before {
        content: "";
        position: absolute;
        inset: -4px;
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 999px;
        background: rgba(3, 4, 6, 0.68);
        box-shadow: 0 14px 44px rgba(0,0,0,0.34);
        backdrop-filter: blur(18px) saturate(1.08);
        -webkit-backdrop-filter: blur(18px) saturate(1.08);
        z-index: -1;
      }
      .brand {
        min-width: 0;
      }
      .eyebrow,
      .subtitle,
      .commentary,
      .commentary-label,
      .commentary-text {
        display: none !important;
      }
      .title,
      .deck-title {
        max-width: min(460px, 48vw);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 0.72rem;
        line-height: 1;
        color: rgba(255,255,255,0.78);
      }
      .status-cluster,
      .status {
        gap: 6px;
      }
      .pill {
        min-height: 24px;
        padding: 3px 8px;
        border-color: rgba(255,255,255,0.1);
        background: rgba(255,255,255,0.06);
        font-size: 0.66rem;
        color: rgba(255,255,255,0.72);
      }
      .pill.timer {
        min-width: 52px;
        font-size: 0.7rem;
      }
      .controls {
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .btn {
        min-height: 28px;
        padding: 5px 9px;
        border-radius: 999px;
        border-color: rgba(255,255,255,0.1);
        background: rgba(255,255,255,0.06);
        color: rgba(255,255,255,0.78);
        font-size: 0.72rem;
        font-weight: 750;
      }
      .btn.primary {
        background: rgba(255,255,255,0.14);
        color: rgba(255,255,255,0.92);
        border-color: rgba(255,255,255,0.15);
      }
      .slide-count {
        min-width: 44px;
        font-size: 0.68rem;
        color: rgba(255,255,255,0.62);
      }
      @media (max-width: 900px) {
        .topbar {
          top: 8px;
          left: 8px;
          right: 8px;
          flex-direction: row;
          align-items: center;
        }
        .home-link {
          top: 8px;
          right: 8px;
          min-height: 28px;
          padding: 5px 9px;
          font-size: 0.68rem;
        }
        .bottombar {
          bottom: 8px;
          max-width: calc(100vw - 16px);
          flex-direction: row;
          align-items: center;
        }
        .title,
        .deck-title {
          max-width: 44vw;
          font-size: 0.68rem;
        }
        .status-cluster,
        .status {
          width: auto;
          justify-content: flex-end;
        }
        .controls {
          margin-left: 0;
          width: auto;
        }
      }
    </style>
  </head>
  <body>
    <a class="home-link" href="../../index.html" aria-label="Zur Deck-Galerie">← Index</a>
    <main class="deck" aria-live="polite">
      <section class="slide active" data-slide>
        <div class="frame">
          <img src="./slide-01-cover.png" alt="Fertige Titelfolie: VW Bus vs. Wohnwagen an der Küste" />
        </div>
      </section>

      <section class="slide" data-slide>
        <div class="frame">
          <img src="./slide-02-freiheit-vs-grundriss.png" alt="Fertige Vergleichsfolie: Team Bus und Team Wohnwagen" />
        </div>
      </section>

      <section class="slide" data-slide>
        <div class="frame">
          <img src="./slide-03-scoreboard.png" alt="Fertige Bewertungsfolie: gefühlte Bewertungsmatrix" />
        </div>
      </section>

      <section class="slide" data-slide>
        <div class="frame">
          <img src="./slide-04-finale.png" alt="Fertige Finalfolie: VW Bus und Wohnwagen beim alpinen Frühstück" />
        </div>
      </section>
    </main>

    <div class="hud">Desktop: Pfeile, Leertaste, Home, End · Mobil: Buttons oder Wischen</div>

    <div class="mobile-controls" aria-label="Mobile Präsentationssteuerung">
      <button type="button" class="mobile-btn" data-nav="prev">← Zurück</button>
      <div class="mobile-page" data-mobile-page>1 / 4</div>
      <button type="button" class="mobile-btn" data-nav="next">Weiter →</button>
    </div>

    <script>
      const slides = Array.from(document.querySelectorAll("[data-slide]"));
      const params = new URLSearchParams(window.location.search);
      const requestedSlide = Number.parseInt(params.get("slide") || "1", 10);
      let currentIndex = Number.isFinite(requestedSlide) ? requestedSlide - 1 : 0;
      const prevButton = document.querySelector('[data-nav="prev"]');
      const nextButton = document.querySelector('[data-nav="next"]');
      const mobilePage = document.querySelector("[data-mobile-page]");
      let touchStartX = null;

      function syncControls() {
        if (mobilePage) mobilePage.textContent = `${currentIndex + 1} / ${slides.length}`;
        if (prevButton) prevButton.disabled = currentIndex === 0;
        if (nextButton) nextButton.disabled = currentIndex === slides.length - 1;
      }

      function renderSlide(nextIndex) {
        currentIndex = Math.max(0, Math.min(nextIndex, slides.length - 1));
        slides.forEach((slide, index) => {
          slide.classList.toggle("active", index === currentIndex);
          slide.setAttribute("aria-hidden", index === currentIndex ? "false" : "true");
        });
        const url = new URL(window.location.href);
        url.searchParams.set("slide", String(currentIndex + 1));
        window.history.replaceState({}, "", url);
        syncControls();
      }

      function advance(delta) {
        renderSlide(currentIndex + delta);
      }

      prevButton?.addEventListener("click", () => advance(-1));
      nextButton?.addEventListener("click", () => advance(1));

      window.addEventListener("touchstart", (event) => {
        touchStartX = event.changedTouches[0]?.clientX ?? null;
      }, { passive: true });

      window.addEventListener("touchend", (event) => {
        if (touchStartX === null) return;
        const touchEndX = event.changedTouches[0]?.clientX ?? touchStartX;
        const deltaX = touchEndX - touchStartX;
        touchStartX = null;
        if (Math.abs(deltaX) < 48) return;
        if (deltaX < 0) advance(1);
        else advance(-1);
      }, { passive: true });

      window.addEventListener("keydown", (event) => {
        if (["ArrowRight", "PageDown", " ", "Spacebar"].includes(event.key)) {
          event.preventDefault();
          advance(1);
          return;
        }

        if (["ArrowLeft", "PageUp"].includes(event.key)) {
          event.preventDefault();
          advance(-1);
          return;
        }

        if (event.key === "Home") {
          event.preventDefault();
          renderSlide(0);
          return;
        }

        if (event.key === "End") {
          event.preventDefault();
          renderSlide(slides.length - 1);
        }
      });

      renderSlide(currentIndex);
    </script>
  </body>
</html>
