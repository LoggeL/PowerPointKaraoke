<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="../../favicon.svg" />
    <title>Die Streckbank als Design-Thinking-Tool</title>
    <style>
      :root { color-scheme: dark; --bg: #030406; --text: #f7f4ee; }
      * { box-sizing: border-box; }
      html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: "Avenir Next", Avenir, "Segoe UI", sans-serif; }
      .deck { width: 100vw; height: 100vh; position: relative; overflow: hidden; }
      .slide { position: absolute; inset: 0; display: none; place-items: center; padding: 0; }
      .slide.active { display: grid; }
      .frame { width: min(100vw, calc(100vh * 16 / 9), 1920px); aspect-ratio: 16 / 9; overflow: hidden; background: #111; }
      .frame img { width: 100%; height: 100%; object-fit: cover; display: block; }
      .hud, .home-link, .hint { position: fixed; z-index: 20; opacity: 0; pointer-events: none; transition: opacity 160ms ease, transform 160ms ease; }
      body.show-ui .hud, body.show-ui .home-link, body.show-ui .hint, .hud:hover, .home-link:hover, .home-link:focus-visible, .hint:hover { opacity: 1; pointer-events: auto; }
      .home-link { top: 10px; right: 10px; transform: translateY(-8px); padding: 6px 10px; border-radius: 999px; border: 1px solid rgba(255,255,255,.10); background: rgba(3,4,6,.48); color: rgba(255,255,255,.78); text-decoration: none; font-size: .72rem; font-weight: 800; backdrop-filter: blur(14px); }
      body.show-ui .home-link, .home-link:hover, .home-link:focus-visible { transform: translateY(0); }
      .hud { left: 50%; bottom: 10px; transform: translateX(-50%) translateY(8px); display: inline-flex; gap: 8px; align-items: center; padding: 6px; border-radius: 999px; border: 1px solid rgba(255,255,255,.10); background: rgba(3,4,6,.48); box-shadow: 0 10px 34px rgba(0,0,0,.24); backdrop-filter: blur(14px); }
      body.show-ui .hud, .hud:hover { transform: translateX(-50%) translateY(0); }
      .btn { min-height: 28px; padding: 5px 10px; border: 0; border-radius: 999px; background: transparent; color: rgba(255,255,255,.72); font: inherit; font-size: .72rem; font-weight: 800; cursor: pointer; }
      .btn:hover:not(:disabled), .btn:focus-visible { background: rgba(255,255,255,.10); color: #fff; }
      .btn:disabled { opacity: .32; cursor: default; }
      .count { min-width: 48px; text-align: center; color: rgba(255,255,255,.52); font-size: .68rem; font-weight: 800; }
      .hint { left: 50%; top: 10px; transform: translateX(-50%) translateY(-8px); max-width: min(840px, calc(100vw - 118px)); padding: 7px 11px; border-radius: 999px; border: 1px solid rgba(255,255,255,.10); background: rgba(3,4,6,.48); color: rgba(255,255,255,.70); font-size: .72rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; backdrop-filter: blur(14px); }
      body.show-ui .hint, .hint:hover { transform: translateX(-50%) translateY(0); }
      @media (max-width: 700px) { .hint { display: none; } .hud { bottom: 8px; } .home-link { top: 8px; right: 8px; } }
    </style>
  </head>
  <body>
    <a class="home-link" href="../../index.html" aria-label="Zur Deck-Galerie">← Index</a>
    <main class="deck" aria-live="polite">
      <section class="slide active" data-slide data-hint="Starte maximal seriös. Das ist kein Foltergerät, das ist ein mittelalterliches Innovation Lab mit Kurbel."><div class="frame"><img src="./slide-01-cover.png" alt="Folie 1: Die Streckbank als Design-Thinking-Tool" /></div></section>
      <section class="slide" data-slide data-hint="Erklär „mehr Raum“ bitte gleichzeitig körperlich, emotional und steuerlich. Keine Rückfragen zulassen."><div class="frame"><img src="./slide-02-painpoint.png" alt="Folie 2: Pain Point: Kunden wollen mehr Raum" /></div></section>
      <section class="slide" data-slide data-hint="Verkauf die Kurbel als radikal fokussierte Produktentscheidung. Alles andere wäre Feature Creep."><div class="frame"><img src="./slide-03-mvp.png" alt="Folie 3: MVP: Zwei Kurbeln, ein Versprechen" /></div></section>
      <section class="slide" data-slide data-hint="Tu so, als hättest du diese Zielgruppen persönlich in zwölf Burgen validiert."><div class="frame"><img src="./slide-04-marktsegmente.png" alt="Folie 4: Marktsegmente" /></div></section>
      <section class="slide" data-slide data-hint="Hier darfst du stolz auf das Wortspiel sein, aber bitte mit der Miene eines CFOs."><div class="frame"><img src="./slide-05-stretchgoals.png" alt="Folie 5: Stretch Goals" /></div></section>
      <section class="slide" data-slide data-hint="Sag „Feedback“ so, als wäre jedes Geräusch ein valider Datensatz."><div class="frame"><img src="./slide-06-ux-research.png" alt="Folie 6: UX-Research: Dramatisches Feedback" /></div></section>
      <section class="slide" data-slide data-hint="Mach aus Samtgriffen eine strategische Differenzierung. Lateinischer Haftungsausschluss ist Premium."><div class="frame"><img src="./slide-07-premium.png" alt="Folie 7: Premium-Ausstattung" /></div></section>
      <section class="slide" data-slide data-hint="Erklär, warum das Stehpult historisch verloren hat. Fakten sind optional, Haltung nicht."><div class="frame"><img src="./slide-08-konkurrenz.png" alt="Folie 8: Konkurrenzanalyse" /></div></section>
      <section class="slide" data-slide data-hint="Werde kurz Compliance-konform und sofort wieder verdächtig optimistisch."><div class="frame"><img src="./slide-09-risiken.png" alt="Folie 9: Risiken: Datenschutz, Bandscheiben, HR" /></div></section>
      <section class="slide" data-slide data-hint="Finale wie ein Gründer, der gerade Ethik als Q4-Problem geparkt hat."><div class="frame"><img src="./slide-10-finale.png" alt="Folie 10: Franchise: Streck &amp; Denk" /></div></section>
    </main>
    <div class="hint" data-hint></div>
    <div class="hud" aria-label="Präsentationssteuerung">
      <button type="button" class="btn" data-nav="prev">←</button>
      <span class="count" data-count>1 / 10</span>
      <button type="button" class="btn" data-nav="next">→</button>
    </div>
    <script>
      const slides = Array.from(document.querySelectorAll('[data-slide]'));
      const params = new URLSearchParams(window.location.search);
      const requestedSlide = Number.parseInt(params.get('slide') || '1', 10);
      let currentIndex = Number.isFinite(requestedSlide) ? requestedSlide - 1 : 0;
      const prevButton = document.querySelector('[data-nav="prev"]');
      const nextButton = document.querySelector('[data-nav="next"]');
      const count = document.querySelector('[data-count]');
      const hint = document.querySelector('[data-hint]:not([data-slide])');
      let touchStartX = null;
      let uiTimer = null;
      function showUi() { document.body.classList.add('show-ui'); clearTimeout(uiTimer); uiTimer = setTimeout(() => document.body.classList.remove('show-ui'), 1700); }
      function syncControls() { count.textContent = `${currentIndex + 1} / ${slides.length}`; prevButton.disabled = currentIndex === 0; nextButton.disabled = currentIndex === slides.length - 1; hint.textContent = slides[currentIndex].dataset.hint || ''; }
      function renderSlide(nextIndex) { currentIndex = Math.max(0, Math.min(nextIndex, slides.length - 1)); slides.forEach((slide, index) => { slide.classList.toggle('active', index === currentIndex); slide.setAttribute('aria-hidden', index === currentIndex ? 'false' : 'true'); }); const url = new URL(window.location.href); url.searchParams.set('slide', String(currentIndex + 1)); window.history.replaceState({}, '', url); syncControls(); }
      function advance(delta) { renderSlide(currentIndex + delta); showUi(); }
      prevButton.addEventListener('click', event => { event.stopPropagation(); advance(-1); });
      nextButton.addEventListener('click', event => { event.stopPropagation(); advance(1); });
      document.querySelector('.deck').addEventListener('click', event => { if (event.target.closest('a, button, .hud, .home-link')) return; advance(1); });
      let wheelLocked = false;
      window.addEventListener('wheel', event => { event.preventDefault(); if (wheelLocked) return; const dominant = Math.abs(event.deltaX) > Math.abs(event.deltaY) ? event.deltaX : event.deltaY; if (Math.abs(dominant) < 12) return; wheelLocked = true; advance(dominant > 0 ? 1 : -1); setTimeout(() => { wheelLocked = false; }, 360); }, { passive: false });
      window.addEventListener('mousemove', showUi, { passive: true });
      window.addEventListener('touchstart', event => { touchStartX = event.changedTouches[0]?.clientX ?? null; showUi(); }, { passive: true });
      window.addEventListener('touchend', event => { if (touchStartX === null) return; const deltaX = (event.changedTouches[0]?.clientX ?? touchStartX) - touchStartX; touchStartX = null; if (Math.abs(deltaX) < 48) return; advance(deltaX < 0 ? 1 : -1); }, { passive: true });
      window.addEventListener('keydown', event => { if (["ArrowRight", "PageDown", " ", "Spacebar"].includes(event.key)) { event.preventDefault(); advance(1); } else if (["ArrowLeft", "PageUp"].includes(event.key)) { event.preventDefault(); advance(-1); } else if (event.key === 'Home') { event.preventDefault(); renderSlide(0); showUi(); } else if (event.key === 'End') { event.preventDefault(); renderSlide(slides.length - 1); showUi(); } });
      renderSlide(currentIndex); showUi();
    </script>
  </body>
</html>
